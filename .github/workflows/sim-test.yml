name: Game simulation tests

on:
  push:
    branches: [main]
    paths:
      - '*.js'
      - 'index.html'
      - '.github/workflows/sim-test.yml'
  pull_request:
    branches: [main]

jobs:
  simulate:
    name: Mock-play all game modes
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Syntax-check game files
        run: |
          for f in prompts_v2.js couples_prompts_v2.js couples_prompts_early.js \
                   orb-data.js orb-templates.js orb-state.js orb-memory.js \
                   orb-engine.js orb-ui.js orb-music.js orb-voice.js ai_orb.js \
                   atmosphere.js orb-analytics.js; do
            node --check "$f"
            echo "OK $f"
          done

      - name: Run game simulation (grammar + engine checks)
        # Deterministic seed sweep: each seed is a fixed, reproducible play-path.
        # Broad coverage without flakiness — a failure names the exact seed to
        # replay locally: node sim_grammar_test.js --seed <N> --games 5 --turns 150
        run: |
          fail=0
          for s in $(seq 1 20); do
            if ! node sim_grammar_test.js --seed "$s" --games 5 --turns 150 | tee /tmp/sim.out | grep -q '^PASS'; then
              echo "::error::sim FAILED at seed $s — replay: node sim_grammar_test.js --seed $s --games 5 --turns 150"
              sed -n '/══ ISSUES/,$p' /tmp/sim.out
              fail=1
            fi
          done
          exit $fail

      - name: Check translation freshness
        run: node check_translations.js

      - name: Play-test Spanish UI (headless jsdom)
        run: |
          npm install --no-save jsdom
          node es_ui_test.js

      - name: Verify deploy folder is in sync
        run: |
          ./deploy-sync.sh
          if ! git diff --quiet -- site/play/; then
            echo "::error::site/play/ is out of sync with root game files — run ./deploy-sync.sh and commit"
            git diff --stat -- site/play/
            exit 1
          fi
          echo "site/play/ is in sync"
